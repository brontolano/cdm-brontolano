server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Redirect relatif agar port asli (mis. :8090) tidak hilang
  absolute_redirect off;

  # Root langsung ke halaman katalog konsumen
  location = / {
    return 302 /katalog;
  }

  # Manifest PWA khusus katalog (start_url /katalog)
  location = /manifest.json {
    try_files /manifest-katalog.json =404;
  }

  # SPA fallback — semua route ditangani React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy ke backend container
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
