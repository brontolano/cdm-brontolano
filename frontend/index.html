<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brontolano" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>Brontolano</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Saat SW baru mengambil alih (mis. setelah deploy), muat ulang sekali
        // agar pengguna langsung dapat versi terbaru tanpa clear cache manual.
        let _reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (_reloading) return; _reloading = true; window.location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Cek pembaruan SW saat halaman dibuka.
            reg.update().catch(() => {});
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
