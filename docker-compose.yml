services:
  db:
    image: postgres:17-alpine
    container_name: cdm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-consumer_data_manager}
    volumes:
      - cdm_pgdata:/var/lib/postgresql/data
    # Port DB TIDAK dipublish agar tidak bentrok dengan PostgreSQL host (5432).
    # Aktifkan baris di bawah hanya jika perlu akses DB dari host (mis. 5433:5432).
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-consumer_data_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cdm-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-consumer_data_manager}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SEED_ON_START: ${SEED_ON_START:-true}
    # Port backend internal saja; diakses lewat nginx frontend (/api).
    # Buka untuk debug langsung bila perlu:
    # ports:
    #   - "4000:4000"

  frontend:
    build: ./frontend
    container_name: cdm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

  # Katalog konsumen — image sama, tapi root diarahkan ke /katalog (port terpisah).
  katalog:
    build: ./frontend
    container_name: cdm-katalog
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx-katalog.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${KATALOG_PORT:-8090}:80"

  # Backup otomatis harian (pg_dump terjadwal ke ./backups). Hapus service ini bila tak perlu.
  backup:
    image: postgres:17-alpine
    container_name: cdm-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-consumer_data_manager}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-loop.sh:/backup-loop.sh:ro
    entrypoint: ["sh", "/backup-loop.sh"]

volumes:
  cdm_pgdata:
