<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base unit — 4·8·12·16·24·32·48·64." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); color: var(--text); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--brand-500); border-radius: 3px; width: 100%; }
  .u .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .u .tk { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
  .cap { margin-top: 14px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="u" style="width:18px"><div class="bar" style="height:4px"></div><span class="px">4</span><span class="tk">1</span></div>
    <div class="u" style="width:24px"><div class="bar" style="height:8px"></div><span class="px">8</span><span class="tk">2</span></div>
    <div class="u" style="width:30px"><div class="bar" style="height:12px"></div><span class="px">12</span><span class="tk">3</span></div>
    <div class="u" style="width:38px"><div class="bar" style="height:16px"></div><span class="px">16</span><span class="tk">4</span></div>
    <div class="u" style="width:48px"><div class="bar" style="height:24px"></div><span class="px">24</span><span class="tk">6</span></div>
    <div class="u" style="width:60px"><div class="bar" style="height:32px"></div><span class="px">32</span><span class="tk">8</span></div>
    <div class="u" style="width:76px"><div class="bar" style="height:48px"></div><span class="px">48</span><span class="tk">12</span></div>
    <div class="u" style="width:96px"><div class="bar" style="height:64px"></div><span class="px">64</span><span class="tk">16</span></div>
  </div>
  <div class="cap">Card padding 16 · section gaps 16–24 · mobile gutters 12–16. Everything snaps to the 8px grid.</div>
</body>
</html>
