<!-- @dsCard group="Brand" viewport="700x196" name="Tiered Pricing Motif" subtitle="Makin banyak, makin murah — the one promise of the brand." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); color: var(--text); }
  .banner { background: linear-gradient(135deg, var(--green-600), var(--green-500)); color: #fff; border-radius: var(--radius-xl); padding: 14px 16px; }
  .banner .h { font-weight: 800; font-size: 15px; margin-bottom: 8px; }
  .strip { display: flex; gap: 7px; }
  .pill { background: rgba(255,255,255,.18); border-radius: var(--radius-pill); padding: 5px 12px; font-size: 12px; white-space: nowrap; }
  .pill b { font-family: var(--font-mono); }
  .cap { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
  .cap b { color: var(--brand-600); }
</style>
</head>
<body>
  <div class="banner">
    <div class="h">💡 Harga Grosir Bertingkat — Makin Banyak, Makin Murah!</div>
    <div class="strip">
      <span class="pill"><b>HET</b> 1–5 krtn</span>
      <span class="pill"><b>S1</b> 6–9</span>
      <span class="pill"><b>S2</b> 10–24</span>
      <span class="pill"><b>S3</b> 25–150</span>
      <span class="pill"><b>S4</b> &gt;150</span>
    </div>
  </div>
  <div class="cap">Five quantity tiers price every product. The hot-tier savings tag uses <b>brand red</b> (🔥 Tier S2) to flag an active discount on a card.</div>
</body>
</html>
