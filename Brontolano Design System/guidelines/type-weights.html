<!-- @dsCard group="Type" viewport="700x150" name="Weights" subtitle="Regular 400 · Medium 500 · Semibold 600 · Bold 700 · Extrabold 800." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); color: var(--text); }
  .row { display: flex; gap: 26px; align-items: baseline; flex-wrap: wrap; }
  .w { display: flex; flex-direction: column; gap: 2px; }
  .w .g { font-size: 30px; letter-spacing: -0.01em; }
  .w .l { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><span class="g" style="font-weight:400">Aa</span><span class="l">400 Regular</span></div>
    <div class="w"><span class="g" style="font-weight:500">Aa</span><span class="l">500 Medium</span></div>
    <div class="w"><span class="g" style="font-weight:600">Aa</span><span class="l">600 Semibold</span></div>
    <div class="w"><span class="g" style="font-weight:700">Aa</span><span class="l">700 Bold</span></div>
    <div class="w"><span class="g" style="font-weight:800">Aa</span><span class="l">800 Extrabold</span></div>
  </div>
</body>
</html>
