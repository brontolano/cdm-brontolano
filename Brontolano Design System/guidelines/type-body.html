<!-- @dsCard group="Type" viewport="700x210" name="Body & Labels" subtitle="14px baseline body, 13px labels, sentence case." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); color: var(--text); }
  .body { font-size: var(--text-base); line-height: var(--leading-normal); max-width: 560px; margin: 0 0 14px; color: var(--slate-700); }
  .label { font-size: var(--text-sm); font-weight: 600; color: var(--text); }
  .cap { font-size: var(--text-xs); color: var(--text-muted); }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--brand-600); margin: 0 0 6px; }
</style>
</head>
<body>
  <p class="eyebrow">Harga grosir bertingkat</p>
  <p class="body">Harga per karton otomatis turun saat jumlah di keranjang bertambah. Mulai dari 6 karton sudah masuk tier S1 — pesan lebih banyak untuk harga partai. Tidak perlu akun, tidak perlu kartu.</p>
  <p class="label">Nama Toko</p>
  <p class="cap">Caption / helper · 12px · slate-500 — mis. "min 5 karakter".</p>
</body>
</html>
