<!-- @dsCard group="Colors" viewport="700x180" name="Commerce & WhatsApp" subtitle="Green = money, savings, go. WhatsApp = the order channel." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .chip { border-radius: var(--radius-md); padding: 12px; height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(0,0,0,.06); }
  .chip .name { font-size: 12px; font-weight: 700; }
  .chip .hex { font-family: var(--font-mono); font-size: 11px; opacity: .92; }
  .cap { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip" style="background:var(--green-500); color:#fff"><span class="name">Commerce</span><span class="hex">#16A34A · 500</span></div>
    <div class="chip" style="background:var(--green-600); color:#fff"><span class="name">Commerce hover</span><span class="hex">#15803D · 600</span></div>
    <div class="chip" style="background:var(--green-50); color:#15803d"><span class="name">Soft bg</span><span class="hex">#F0FDF4 · 50</span></div>
    <div class="chip" style="background:var(--wa-green); color:#0b3d1c"><span class="name">WhatsApp</span><span class="hex">#25D366</span></div>
    <div class="chip" style="background:var(--wa-green-dark); color:#fff"><span class="name">WA pressed</span><span class="hex">#1EBE57</span></div>
  </div>
  <div class="cap">Add-to-cart, checkout & the "makin murah" savings tags ride green; the WhatsApp hue is reserved for "Pesan via WhatsApp" / broadcast only.</div>
</body>
</html>
