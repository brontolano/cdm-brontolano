<!-- @dsCard group="Colors" viewport="700x176" name="Slate Neutrals" subtitle="The structural spine — page, cards, borders, ink, text." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
  .sw { height: 88px; display: flex; align-items: flex-end; padding: 7px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .meta { display: flex; justify-content: space-between; align-items: baseline; margin-top: 12px; }
  .meta .base { font-family: var(--font-mono); font-size: 13px; color: var(--text); }
  .meta .use { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--slate-0); box-shadow: inset 0 0 0 1px var(--border)"><span style="color:#475569">0</span></div>
    <div class="sw" style="background:var(--slate-50)"><span style="color:#475569">50</span></div>
    <div class="sw" style="background:var(--slate-100)"><span style="color:#475569">100</span></div>
    <div class="sw" style="background:var(--slate-200)"><span style="color:#475569">200</span></div>
    <div class="sw" style="background:var(--slate-300)"><span style="color:#334155">300</span></div>
    <div class="sw" style="background:var(--slate-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--slate-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--slate-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--slate-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--slate-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--slate-900)"><span style="color:#fff">900</span></div>
  </div>
  <div class="meta">
    <div class="base">--slate-100 page · --slate-200 border · --slate-900 ink</div>
    <div class="use">Surfaces · borders · text</div>
  </div>
</body>
</html>
