<!-- @dsCard group="Colors" viewport="700x172" name="Surfaces" subtitle="From page to ink — where each surface is used." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .s { height: 96px; border-radius: var(--radius-md); border: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .s .t { font-size: 12px; font-weight: 700; }
  .s .h { font-family: var(--font-mono); font-size: 10.5px; opacity: .85; }
  .cap { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="s" style="background:var(--surface-page)"><span class="t" style="color:var(--text)">Page</span><span class="h" style="color:var(--text-muted)">slate-100</span></div>
    <div class="s" style="background:var(--surface-card)"><span class="t">Card</span><span class="h" style="color:var(--text-muted)">white + hairline</span></div>
    <div class="s" style="background:var(--surface-sunken)"><span class="t">Sunken</span><span class="h" style="color:var(--text-muted)">slate-50 · img wells</span></div>
    <div class="s" style="background:var(--surface-ink); border-color:#1e293b"><span class="t" style="color:#fff">Ink</span><span class="h" style="color:#cbd5e1">slate-900 · sidebar</span></div>
    <div class="s" style="background:var(--surface-black); border-color:#000"><span class="t" style="color:#fff">Black</span><span class="h" style="color:#cbd5e1">catalog header</span></div>
  </div>
  <div class="cap">Flat by default: white cards on a slate-100 field, structure carried by 1px hairlines. Dark surfaces anchor the admin sidebar and the public catalog bar.</div>
</body>
</html>
