<!-- @dsCard group="Spacing" viewport="700x172" name="Corner Radii" subtitle="Rounder = friendlier (public); tighter = denser (utility)." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); color: var(--text); }
  .row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 56px; background: var(--brand-50); border: 1.5px solid var(--brand-500); }
  .u .l { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); text-align: center; }
  .pill { width: 76px; height: 36px; border-radius: 999px; background: var(--brand-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="box" style="border-radius:6px"></div><span class="l">xs 6<br>image</span></div>
    <div class="u"><div class="box" style="border-radius:8px"></div><span class="l">sm 8<br>button</span></div>
    <div class="u"><div class="box" style="border-radius:12px"></div><span class="l">lg 12<br>card</span></div>
    <div class="u"><div class="box" style="border-radius:14px"></div><span class="l">xl 14<br>product</span></div>
    <div class="u"><div class="box" style="border-radius:16px"></div><span class="l">2xl 16<br>sheet</span></div>
    <div class="u"><div class="pill"></div><span class="l">pill 999<br>badge/chip</span></div>
  </div>
</body>
</html>
