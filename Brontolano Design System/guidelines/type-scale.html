<!doctype html>
<html lang="id">

<link rel="stylesheet" href="../styles.css">

</style>

<body>

  <div class="r"><span class="tok">2xl · 20</span><span class="ex" style="font-size:20px">Order Terbaru</span></div>
  <div class="r"><span class="tok">lg · 16</span><span class="ex" style="font-size:16px">Indomie Goreng</span></div>
  <div class="r"><span class="tok">base · 14</span><span class="ex" style="font-size:14px;font-weight:400">Body &amp; table cells</span></div>
  <div class="r"><span class="tok">sm · 13</span><span class="ex" style="font-size:13px;font-weight:600">Form label</span></div>
  <div class="r"><span class="tok">2xs · 11</span><span class="ex" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)">TABLE HEADER</span></div>
