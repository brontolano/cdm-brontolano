<!-- @dsCard group="Colors" viewport="700x180" name="Semantic States" subtitle="Success green, info blue, warning amber, danger red." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .chip { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip .solid { height: 60px; display: flex; align-items: flex-end; padding: 8px; color: #fff; font-size: 12px; font-weight: 700; }
  .chip .soft { padding: 8px 10px; font-family: var(--font-mono); font-size: 11px; }
  .cap { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><div class="solid" style="background:var(--success)">Success</div><div class="soft" style="background:var(--green-50); color:var(--green-600)">#16A34A</div></div>
    <div class="chip"><div class="solid" style="background:var(--info)">Info</div><div class="soft" style="background:var(--info-50); color:var(--info-700)">#2563EB</div></div>
    <div class="chip"><div class="solid" style="background:var(--warning)">Warning</div><div class="soft" style="background:var(--warn-50); color:var(--warn-700)">#D97706</div></div>
    <div class="chip"><div class="solid" style="background:var(--danger)">Danger</div><div class="soft" style="background:var(--danger-50); color:var(--danger-700)">#DC2626</div></div>
  </div>
  <div class="cap">Danger red is deeper than brand red and used <b>only</b> for destructive/error. Info blue is also the legacy admin accent &amp; the "confirmed" status hue.</div>
</body>
</html>
