<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .cols { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; align-items: start; }
  /* show the modal inline (not fixed) so it sits inside the card preview */
  .modal-demo .ds-modal-overlay { position: static; padding: 0; background: transparent; animation: none; }
  .modal-demo .ds-modal { box-shadow: var(--shadow-lg); animation: none; }
  .toasts { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.BrontolanoDesignSystem_7cf21c || {};
  const { Card, Modal, Toast, Button, Input, StatusBadge } = NS;

  function Demo() {
    return (
      <div className="cols">
        <div>
          <Card title="Order Terbaru" actions={<Button size="sm" variant="ghost">Lihat semua</Button>}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 14 }}>
              <span>ORD-00123 · Toko Berkah</span>
              <StatusBadge status="dikirim" />
            </div>
          </Card>
          <div className="toasts">
            <Toast type="success">Order ORD-00123 dibuat</Toast>
            <Toast type="error">Gagal menyimpan — periksa koneksi</Toast>
          </div>
        </div>
        <div className="modal-demo">
          <Modal title="Tambah Konsumen" onClose={null}
            footer={<><Button variant="secondary">Batal</Button><Button>Simpan</Button></>}>
            <Input label="Nama Toko" required placeholder="Toko Berkah Jaya" />
            <Input label="Kontak WA" prefix="+62" placeholder="81234 5678" />
          </Modal>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
