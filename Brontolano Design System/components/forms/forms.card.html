<!-- @dsCard group="Components" viewport="700x430" name="Buttons & Forms" subtitle="Button · IconButton · Input · Select — live from the bundle." -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .lane { margin-bottom: 16px; }
  .lane h4 { font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--text-subtle); margin: 0 0 9px; font-weight: 700; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.BrontolanoDesignSystem_7cf21c || {};
  const { Button, IconButton, Input, Select } = NS;

  function Demo() {
    return (
      <React.Fragment>
        <div className="lane">
          <h4>Variants</h4>
          <div className="row">
            <Button variant="primary">Simpan</Button>
            <Button variant="secondary">Batal</Button>
            <Button variant="ghost">Detail</Button>
            <Button variant="danger">Hapus</Button>
            <Button variant="commerce">+ Keranjang</Button>
            <Button variant="whatsapp">Pesan via WhatsApp</Button>
          </div>
        </div>
        <div className="lane">
          <h4>Sizes &amp; states</h4>
          <div className="row">
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <Button disabled>Disabled</Button>
            <Button variant="commerce" iconLeft={<span>🛒</span>}>With icon</Button>
            <IconButton label="Tutup" outline>✕</IconButton>
            <IconButton label="Kurangi" size="lg" outline>−</IconButton>
            <IconButton label="Tambah" size="lg" outline>+</IconButton>
          </div>
        </div>
        <div className="lane">
          <h4>Form controls</h4>
          <div className="cols">
            <div>
              <Input label="Nama Toko" required placeholder="Toko Berkah Jaya" />
              <Input label="Kontak WA" prefix="+62" placeholder="81234 5678" />
            </div>
            <div>
              <Input label="Alamat" error="Minimal 5 karakter" defaultValue="Jl." />
              <div className="ds-field">
                <label className="ds-field__label">Konsumen</label>
                <Select placeholder="— pilih konsumen —" options={['Toko Berkah', 'Warung Bu Sri', 'Grosir Makmur']} />
              </div>
            </div>
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
